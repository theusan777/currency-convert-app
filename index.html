<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="./assets/index.css">

<title>Currency Convert</title>

</head>

<body>

<div class="background-image"></div>

<header>

<img src="./img/logo.png">

<h1>Currency Convert</h1>

</header>

<main>

<form id="converter-form">

<div class="input-group">

<label for="amount">
Valor
</label>

<input
type="text"
id="amount"
placeholder="Digite o valor"
required>

</div>

<div class="input-group">

<label for="currency-from">
De
</label>

<div class="currency-select">

<img
id="from-flag"
src="./assets/flags/us.svg">

<select id="currency-from">

<option value="USD">
Dólar (USD)
</option>

<option value="EUR">
Euro (EUR)
</option>

<option value="GBP">
Libra (GBP)
</option>

<option value="BRL">
Real (BRL)
</option>

</select>

</div>

</div>

<div class="input-group">

<label for="currency-to">
Para
</label>

<div class="currency-select">

<img
id="to-flag"
src="./assets/flags/br.svg">

<select id="currency-to">

<option value="BRL">
Real (BRL)
</option>

<option value="USD">
Dólar (USD)
</option>

<option value="EUR">
Euro (EUR)
</option>

<option value="GBP">
Libra (GBP)
</option>

</select>

</div>

</div>

<button
type="button"
id="swap">

<svg
id="swap-icon"
xmlns="http://www.w3.org/2000/svg"
width="20"
height="20"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">

<path d="M7 7h11l-4-4"></path>

<path d="M17 17H6l4 4"></path>

</svg>

Inverter moedas

</button>

<button
type="button"
id="convert">

Converter

</button>

</form>

<section class="result">

<span id="description">

Cotação aparecerá aqui

</span>

<h2 id="result">

--

</h2>

</section>

</main>

<footer>

<small>

Conversor de moedas

</small>

</footer>

<script src="./script.js"></script>

</body>

</html>
